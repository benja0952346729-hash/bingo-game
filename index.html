/* GENERATE BOARD */
function generateBoard(seed){

function seededRandom(seed){
  let x = Math.sin(seed++) * 10000;
  return x - Math.floor(x);
}

function getNums(min,max,seed){
  let arr = [];
  let s = seed;

  while(arr.length < 5){
    let n = Math.floor(seededRandom(s++)*(max-min+1))+min;
    if(!arr.includes(n)) arr.push(n);
  }
  return arr;
}

let B = getNums(1,15,seed*1);
let I = getNums(16,30,seed*2);
let N = getNums(31,45,seed*3);
let G = getNums(46,60,seed*4);
let O = getNums(61,75,seed*5);

let board = [];

for(let i=0;i<5;i++){
  board.push(B[i],I[i],N[i],G[i],O[i]);
}

board[12] = "FREE";

return board;
}

}

function speakNumber(num){

let letter="";
if(num<=15) letter="B";
else if(num<=30) letter="I";
else if(num<=45) letter="N";
else if(num<=60) letter="G";
else letter="O";

let text = letter + " " + num;

let speech = new SpeechSynthesisUtterance(text);
speech.lang = "en-US";

speechSynthesis.speak(speech);
}

function updateCards(){

  document.querySelectorAll(".smallCell").forEach(c=>{

    let text = c.innerText.trim();

    // BINGO header skip
    if(["B","I","N","G","O"].includes(text)) return;

    // FREE
    if(text === "F"){
      c.style.background="gold";
      c.style.color="black";
      return;
    }

    let val = Number(text);

    if(calledNumbers.includes(val)){

      let wrap = c.closest("[data-mine]");
      let isMine = wrap && wrap.dataset.mine === "yes";

      if(isMine){
        c.style.background = "#00e676"; // yours
      }else{
        c.style.background = "#ff1744"; // others
      }

      c.style.color="white";
    }

  });

}
